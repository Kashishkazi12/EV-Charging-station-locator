<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EV Spot | Login</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <style>
    :root {
      --dark: #021024;
      --navy: #021024;
      --blue: #021024;
      --light-blue: #021024;
      --sky: #021024;
      --green: #32cd32;
      --white: #f9f9f9;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, var(--blue), var(--sky));
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .login-container {
      width: 380px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      padding: 40px 30px;
      color: white;
      text-align: center;
      animation: fadeInUp 0.8s ease;
    }

    @keyframes fadeInUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    h2 {
      margin-bottom: 20px;
      font-weight: 600;
      color: #fff;
      text-shadow: 0px 0px 10px rgba(0,0,0,0.3);
    }

    .tabs {
      display: flex;
      justify-content: space-around;
      margin-bottom: 25px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      overflow: hidden;
    }

    .tab {
      flex: 1;
      padding: 10px 0;
      cursor: pointer;
      font-weight: 500;
      color: #eee;
      transition: 0.3s;
    }

    .tab.active {
      background: var(--green);
      color: #fff;
    }

    form {
      display: none;
      flex-direction: column;
      gap: 15px;
      text-align: left;
      animation: fadeIn 0.5s ease;
    }

    form.active { display: flex; }

    label { font-size: 14px; color: #fff; }
    input {
      padding: 10px 12px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 14px;
    }

    input::placeholder { color: rgba(255,255,255,0.8); }

    button {
      background: var(--green);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover { background: #28a428; }

    .link {
      margin-top: 15px;
      font-size: 14px;
      color: #fff;
    }

    .link a { color: var(--sky); text-decoration: none; }

    /* OTP area */
    #otp-section {
      display: none;
      text-align: center;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>
<body>
  <div class="login-container">
    <h2>⚡ Welcome Back to EV Spot</h2>

    <div class="tabs">
      <div class="tab active" id="emailTab">Email Login</div>
      <div class="tab" id="phoneTab">Phone OTP</div>
    </div>

    <!-- Email Login -->
    <form id="login-form" class="active">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="Enter your email" required>

      <label>Password</label>
      <input type="password" id="login-password" placeholder="Enter your password" required>

      <button type="submit">Login</button>
      <div class="link">Don’t have an account? <a href="register.html">Register</a></div>
    </form>

    <!-- Phone Login -->
    <form id="phone-login-form">
      <label>Phone Number (+91...)</label>
      <input type="text" id="phoneNumber" placeholder="+91XXXXXXXXXX" required>

      <div id="recaptcha-container"></div>
      <button type="submit">Send OTP</button>

      <div id="otp-section">
        <label>Enter OTP</label>
        <input type="text" id="otpCode" placeholder="6-digit code">
        <button id="verifyOtpBtn" type="button">Verify OTP</button>
      </div>
    </form>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
  <script type="module" src="app.js"></script>

  <!-- Toggle script -->
  <script>
    const emailTab = document.getElementById("emailTab");
    const phoneTab = document.getElementById("phoneTab");
    const emailForm = document.getElementById("login-form");
    const phoneForm = document.getElementById("phone-login-form");

    emailTab.addEventListener("click", () => {
      emailTab.classList.add("active");
      phoneTab.classList.remove("active");
      emailForm.classList.add("active");
      phoneForm.classList.remove("active");
    });

    phoneTab.addEventListener("click", () => {
      phoneTab.classList.add("active");
      emailTab.classList.remove("active");
      phoneForm.classList.add("active");
      emailForm.classList.remove("active");
    });
  </script>
</body>
</html>
